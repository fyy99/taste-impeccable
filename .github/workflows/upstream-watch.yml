name: Watch upstream releases

on:
  schedule:
    - cron: "17 3 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
      - name: Check tracked upstreams
        run: |
          set +e
          python scripts/sync_upstreams.py --check-updates
          status=$?
          if [ "$status" -eq 3 ]; then
            echo "Upstream update found. Review refs, generated diff, licenses, and orchestration before merging." >> "$GITHUB_STEP_SUMMARY"
          fi
          exit "$status"
